---
version: "2"
linters:
  enable-all: true
  disable:
    - "testpackage"
    - "exhaustruct"
    - "err113"
    - "depguard"
    - "funlen"
linters-settings:
  mnd:
    ignored-numbers:
      - "0o644"
      - "0o755"
      - "42"
  goconst:
    ignore-tests: true
formatters:
  enable:
    - "gci"
    - "gofmt"
    - "gofumpt"
    - "goimports"
    - "golines"
  settings:
    golines:
      max-len: 120
...
